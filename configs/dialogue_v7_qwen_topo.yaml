# Dialogue game — v7 decoder, Qwen-latent targets, topographic similarity.
#
# Adds the Chaabouni et al. (2019) topographic similarity loss:
# pairwise target cosine structure must be preserved in pairwise
# message (receiver encoding) structure.  This pushes the agent toward
# semantically organized Neuroglot — similar targets → similar
# expressions — rather than an arbitrary discriminative codebook.
#
# REINFORCE round-trip is DISABLED (zero weight).

decoder_path: data/models/v7/vae_decoder.pt
spm_path: data/models/v7/spm.model
output_dir: data/dialogue_game_qwen_v2_topo
embedding_store_dir: data/embeddings_qwen_v2_clean

# Dialogue structure
num_turns: 4
context_hidden_dim: 512
context_heads: 4

# Diffusion z-generator
diffusion_steps: 4
diffusion_layers: 4
diffusion_heads: 8
max_phrases: 3
variable_phrases: true
target_phrases: 2.0
length_weight: 0.5
z_diversity_weight: 0.3

# Loss
per_turn_weight: 0.0
ce_weight: 0.1
independent_turns: false

# Topographic similarity (Chaabouni et al. 2019)
topo_weight: 0.5

# Phase 2 VRAM management (local 3060 Ti 8 GB)
phase2_vram_budget_mb: 1500
phase2_min_chunk: 4

# Training
batch_size: 115
gradient_accumulation_steps: 1
steps: 6000
gru_lr: 0.00005
receiver_lr: 0.0003
num_distractors: 15
min_targets: 1
max_targets: 1


# Runtime
device: cuda
seed: 42
log_every: 20
checkpoint_every: 100
