# Production run — mT5-large on vast.ai (A100 40GB or equivalent)
# Uses full 11.6M DepTreeVAE constituency dataset for Phase 1.
# Requires: build-vocab first, then train-phase1, then train-phase2.

vocab_size: 8000
vocab_seed: 42

base_model_name: google/mt5-large

source_embedding_dim: 384   # all-MiniLM-L6-v2
n_prefix_tokens: 8

# Phase 1: cipher fine-tuning on local passages
phase1_dataset_dir: data/embeddings/passages.jsonl
phase1_batch_size: 64
phase1_lr: 0.0001
phase1_steps: 100000
phase1_max_source_len: 128
phase1_max_target_len: 128
phase1_log_every: 500
phase1_diag_every: 2000
phase1_checkpoint_every: 10000

# Phase 2: embedding conditioning on 300K embedding store
phase2_store_dir: data/embeddings
phase2_batch_size: 128
phase2_lr: 0.001
phase2_steps: 30000
phase2_max_target_len: 128
phase2_length_loss_weight: 0.1
phase2_log_every: 500
phase2_checkpoint_every: 5000

length_slack: 10

output_dir: data/synth_mt5large
device: cuda
seed: 42
