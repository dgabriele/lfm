# OOM recovery test — batch_size=4 should OOM on 8GB, auto-reduce
model_name: Qwen/Qwen2.5-0.5B
corpus_path: data/translator/dialogue_corpus_v7_tagged.txt
output_dir: data/translator_oom_test

epochs: 1
lr: 5e-5
batch_size: 4
max_len: 512
gradient_accumulation_steps: 32
use_amp: true
warmup_fraction: 0.1
max_grad_norm: 1.0
checkpoint_fraction: 0.5

device: cuda
seed: 42
