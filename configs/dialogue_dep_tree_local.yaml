# Small-scale contrastive dialogue game with DepTreeVAE decoder
# Local 8GB GPU — conservative batch size
#
# Uses the dep-tree-disentangled decoder trained on 10.4M English sentences.
# The frozen decoder receives role-level cross-attention memory from z_content,
# so the agent game's z-generator controls both structure (z_struct) and
# content (z_content) independently.

decoder_path: data/models/dep_tree_vae_v2/best.pt
spm_path: data/models/v15b_ipa/spm.model
output_dir: data/dialogue_game_dep_tree_local
embedding_store_dir: data/embeddings_qwen_v2_clean

generator_name: multilingual_vae
generator_vocab_size: 8000

# Dialogue structure
num_turns: 4
context_hidden_dim: 512
context_heads: 4

# Diffusion z-generator
diffusion_steps: 4
diffusion_layers: 4
diffusion_heads: 8
max_phrases: 2
variable_phrases: true
target_phrases: 1.5
length_weight: 0.5
z_diversity_weight: 0.3

# CLIP-style contrastive scoring
contrastive_scoring: true
contrastive_temperature: 0.07
contrastive_pooling: mean

# Other losses off
per_turn_weight: 0.0
ce_weight: 0.0
topo_weight: 0.0
independent_turns: false

# No constrained close
constrained_close: false
max_tokens_per_phrase: 80

# No length reg (caused collapse before)
length_reg_weight: 0.0
length_reg_target: 80
length_reg_sigma: 10.0

# Training — 8GB GPU constraint
batch_size: 64
gradient_accumulation_steps: 4
steps: 6000
gru_lr: 0.00005
receiver_lr: 0.0003
min_targets: 1
max_targets: 1

# Slow curriculum (proven effective)
warmup_steps: 2500

# Runtime
device: cuda
seed: 42
log_every: 20
checkpoint_every: 200
