# DepTree Dialogue Game — disentangled structure/content z-generation
#
# Frozen DepTreeVAE v2 decoder (10.4M English dep-parsed IPA, kl=0.01).
# Multi-role decode: one short phrase per skeleton role, KV cache across
# roles for cross-role coherence, natural EOS per role.

vae_checkpoint: data/models/dep_tree_vae_v2/resume.pt
spm_path: data/models/v15b_ipa/spm.model
output_dir: data/dialogue_game_dep_tree_local
embedding_store_dir: data/embeddings_qwen_v2_clean

# VAE architecture (must match checkpoint)
latent_total_dim: 256
latent_struct_dim: 64
latent_content_dim: 192
spm_vocab_size: 8000
vae_max_seq_len: 160

# Dialogue
num_turns: 4

# z-generators
diffusion_steps: 4
diffusion_layers: 4
diffusion_heads: 8
content_gen_hidden: 512
struct_gen_hidden: 256

# Contrastive scoring + topology
contrastive_scoring: true
contrastive_temperature: 0.07
topo_weight: 1.0

# Multi-role decode (one short phrase per skeleton role)
max_tokens_per_role: 20

# Training
batch_size: 196
gradient_accumulation_steps: 1
steps: 6000
struct_lr: 0.00005
content_lr: 0.00005
receiver_lr: 0.0003
max_grad_norm: 1.0
num_distractors: 15
min_targets: 1
max_targets: 1

# Curriculum
warmup_steps: 1875

# Runtime
device: cuda
seed: 42
log_every: 20
checkpoint_every: 200
