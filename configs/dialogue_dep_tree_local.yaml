# DepTree Dialogue Game — disentangled structure/content z-generation
# Local 8GB GPU — conservative batch size
#
# Uses the frozen DepTreeVAE v2 decoder trained on 10.4M English dep-parsed
# sentences. Structure gen produces z_struct once per dialogue (shared grammar),
# content gen produces z_content per turn via diffusion flow-matching.

vae_checkpoint: data/models/dep_tree_vae_v2/resume.pt
spm_path: data/models/v15b_ipa/spm.model
output_dir: data/dialogue_game_dep_tree_local
embedding_store_dir: data/embeddings_qwen_v2_clean

# VAE architecture (must match checkpoint)
latent_total_dim: 256
latent_struct_dim: 64
latent_content_dim: 192
spm_vocab_size: 8000

# Dialogue structure
num_turns: 4

# Content z-generator (diffusion flow-matching, per turn)
diffusion_steps: 4
diffusion_layers: 4
diffusion_heads: 8
content_gen_hidden: 512

# Structure z-generator (MLP, once per dialogue)
struct_gen_hidden: 256

# Contrastive scoring (batch-wide InfoNCE) + topology preservation
contrastive_scoring: true
contrastive_temperature: 0.07
topo_weight: 1.0

# KL prior — keeps z on VAE manifold for coherent surface forms
z_kl_weight: 0.0

# Decode
max_decode_len: 60

# Training — 4GB GPU constraint
batch_size: 512
gradient_accumulation_steps: 1
steps: 6000
struct_lr: 0.00005
content_lr: 0.00005
receiver_lr: 0.0003
max_grad_norm: 1.0
num_distractors: 15
min_targets: 1
max_targets: 1

# Curriculum (25% faster than default)
warmup_steps: 1875

# Runtime
device: cuda
seed: 42
log_every: 20
checkpoint_every: 200
