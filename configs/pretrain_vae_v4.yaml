# VAE decoder pretraining config (v4)
#
# Constituency-augmented dataset (~5M samples: full sentences + sub-phrases).
# Changes from v1:
#   - attention pooling (0.25 CE improvement over mean pooling)
#   - latent_dim 384 (wider manifold: short NPs to full sentences)
#   - encoder_num_layers 3 (more capacity for diverse input lengths)
#   - 20 epochs (10x more data per epoch than v1)
#   - dataset_path: constituency-augmented HDF5

dataset_path: data/datasets/leipzig-constituents
corpus_loader: leipzig
corpus_loader_config:
  data_dir: data/leipzig

# Tokenizer
spm_vocab_size: 8000

# Architecture
latent_dim: 384
encoder_num_layers: 3
decoder_hidden_dim: 512
decoder_num_layers: 4
decoder_num_heads: 8
decoder_dropout: 0.1

# Linguistic structure
attention_head_windows: [3, 3, 7, 7, 15, 15, 0, 0]
attention_global_every: 7
use_rope: true
share_decoder_layers: true
max_seq_len: 96
encoder_pooling: mean

# KL — disabled
kl_weight: 0.0
kl_free_bits: 0.5
kl_warmup_steps: 10000

# Contrastive / KL-beta / phonetic — disabled
contrastive_weight: 0.0
contrastive_temperature: 0.07
embeddings_path: ""
kl_beta: 0.0
phonetic_init: false
phonetic_init_scale: 0.5
phonetic_label_smoothing: 0.0

# VQ — disabled (continuous VAE)
use_vq: false

# Training
batch_size: 160
gradient_accumulation_steps: 1
use_amp: true
lr: 0.001
lr_min: 0.0001
num_epochs: 50

# Latent regularization
z_var_weight: 0.0
z_var_target: 0.05
word_dropout: 0.01
word_dropout_min: 0.0
word_dropout_anneal_epochs: 20
dip_weight: 0.1
val_fraction: 0.1
seed: 42
device: cuda
output_path: data/models/v4/vae_decoder.pt

# Topological regularization
topo_weight: 0.0
topo_sample_pairs: 32

# Adversarial discriminator
use_adversarial: false
adv_weight: 0.1
adv_lr: 0.0001
adv_disc_hidden: 256
adv_disc_embed_dim: 128
adv_warmup_steps: 1000
adv_free_run_len: 32
adv_spectral_norm: true
