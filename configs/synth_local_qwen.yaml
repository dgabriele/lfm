# Local run — Qwen2.5-0.5B on RTX 3060 Ti (8 GB)
# Decoder-only architecture: frozen LM body + alien cipher head + prefix projector.
# Phase 1: cipher fine-tuning (English → alien). Trains: _alien_emb, _alien_head.
# Phase 2: embedding conditioning (source_emb → alien). Trains: projector, length_head.

vocab_size: 2000
vocab_seed: 42

base_model_name: Qwen/Qwen2.5-0.5B

source_embedding_dim: 384    # all-MiniLM-L6-v2
n_prefix_tokens: 8

# Phase 1
phase1_dataset_dir: data/embeddings/passages.jsonl
phase1_batch_size: 32
phase1_lr: 0.0001
phase1_steps: 50000
phase1_max_source_len: 64
phase1_max_target_len: 64
phase1_log_every: 200
phase1_diag_every: 1000
phase1_checkpoint_every: 5000

# Phase 2
phase2_store_dir: data/embeddings
phase2_batch_size: 64
phase2_lr: 0.001
phase2_steps: 100000
phase2_length_loss_weight: 0.1
phase2_log_every: 200
phase2_checkpoint_every: 2000

length_slack: 10

output_dir: data/synth_qwen_local
device: cuda
seed: 42
