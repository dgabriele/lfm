# Extended local run — mT5-small on RTX 3060 Ti (8 GB)
# Reuses vocab/tokenizer from synth_smoke.
# Phase 1: 10K steps to validate cipher transfer.
# Phase 2: 2K steps to validate embedding conditioning.

vocab_size: 2000
vocab_seed: 42

base_model_name: google/mt5-small

source_embedding_dim: 384
n_prefix_tokens: 8

phase1_dataset_dir: data/embeddings/passages.jsonl
phase1_batch_size: 128
phase1_lr: 0.0001
phase1_steps: 50000
phase1_max_source_len: 64
phase1_max_target_len: 64
phase1_log_every: 200
phase1_diag_every: 1000
phase1_ar_every: 10
phase1_ar_weight: 0.5
phase1_ar_batch_size: 8
phase1_checkpoint_every: 2000

phase2_store_dir: data/embeddings
phase2_batch_size: 32
phase2_lr: 0.001
phase2_steps: 2000
phase2_length_loss_weight: 0.1
phase2_log_every: 200
phase2_checkpoint_every: 1000

length_slack: 10

output_dir: data/synth_local
device: cuda
seed: 42
