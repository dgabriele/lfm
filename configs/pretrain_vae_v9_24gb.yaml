# ==========================================================================
# v9 VAE decoder pretraining — English-pidgin alphabet (1500 Qwen BPE tokens)
#
# v9 vs v8 architectural differences:
#   - vocab_size: 30 (v8 phonemes) → 1501 (v9: 1500 BPE tokens + <ws>)
#   - corpus: 12-language IPA hash → real English BPE-tokenized
#   - alphabet: vestigial low-prior subwords → semantic-rich productive
#     morphemes (function words, content roots, neoclassical prefixes)
#   - downstream rendering: each token = single Ġ-prefixed Qwen unit;
#     surface = space-joined → guaranteed deterministic Qwen tokenization
#     AND interpretable phrase structure (English-pidgin reading).
# ==========================================================================

dataset_path: /workspace/lfm/data/datasets/english-v9-pidgin
corpus_loader: phoneme_h5
corpus_loader_config:
  h5_path: /workspace/lfm/data/datasets/english-v9-pidgin/samples.h5

# v9 alphabet (5000 phonemes + 1 <ws> = 5001)
spm_model_path: /workspace/lfm/data/phoneme_alphabet_v9.json
spm_vocab_size: 5001
syllable_aligned_bpe: false

# Architecture (mirrors v7/v8 — 16M-param decoder)
latent_dim: 256
encoder_num_layers: 2
decoder_hidden_dim: 512
decoder_num_layers: 4
decoder_num_heads: 8
decoder_dropout: 0.1
num_memory_tokens: 8

attention_head_windows: [3, 3, 7, 7, 15, 15, 0, 0]
attention_global_every: 7
use_rope: true
share_decoder_layers: true
max_seq_len: 0  # auto-scale (v9 sequences ≤ ~50 tokens, much shorter than v8)
encoder_pooling: mean

kl_weight: 0.0
kl_free_bits: 0.5
kl_warmup_steps: 10000
kl_beta: 0.0

contrastive_weight: 0.0
contrastive_temperature: 0.07
embeddings_path: ""
phonetic_init: false
phonetic_init_scale: 0.5
phonetic_label_smoothing: 0.0
use_vq: false

# Training (24GB targeted)
batch_size: 256
gradient_accumulation_steps: 1
use_amp: true
lr: 0.0005
lr_min: 0.0001
num_epochs: 3

z_var_weight: 0.01
z_var_target: 0.03
z_var_floor: 0.01
word_dropout: 0.0
word_dropout_min: 0.0
word_dropout_anneal_epochs: 0
dip_weight: 0.1
bow_weight: 0.0

length_boost_threshold: 30
length_boost_factor: 5.0

diagnostic_every: 2000
checkpoint_every_steps: 2000
val_fraction: 0.02
seed: 42
device: cuda
output_path: /workspace/lfm/data/models/v9/vae_decoder.pt

topo_weight: 0.0
topo_sample_pairs: 32
use_adversarial: false
adv_weight: 0.1
adv_lr: 0.0001
adv_disc_hidden: 256
adv_disc_embed_dim: 128
adv_warmup_steps: 1000
adv_free_run_len: 32
adv_spectral_norm: true
constituent_context: false
