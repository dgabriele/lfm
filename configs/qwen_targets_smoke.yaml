# Smoke-test config: runs the full pipeline on a tiny slice of Leipzig
# so we can catch integration bugs before committing to a 300K run.

sources:
  - path: data/embeddings/passages.jsonl
    text_field: text
    weight: 1.0
    max_samples: 2000
    name: leipzig-smoke

output_dir: data/embeddings_qwen_smoke

extractor:
  model_name: Qwen/Qwen2.5-0.5B
  layer: -1
  pooling: last_token
  dtype: bfloat16
  batch_size: 16
  max_len: 256

density:
  enabled: true
  knn_k: 10
  temperature: 0.7
  target_size: 2000

cluster:
  num_clusters: 64
  random_state: 42
  batch_size: 512

shuffle_seed: 42
device: cuda
max_extracted: 2000
