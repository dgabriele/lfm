# synth smoke test — local RTX 3060 Ti (8 GB)
# Uses mT5-small (300M) for fast iteration.

vocab_size: 2000
vocab_seed: 42

base_model_name: google/mt5-small

source_embedding_dim: 384   # matches local embeddings store (all-MiniLM-L6-v2)
n_prefix_tokens: 8

# Phase 1: use local passages.jsonl as English source
phase1_dataset_dir: data/embeddings/passages.jsonl
phase1_batch_size: 16
phase1_lr: 0.0001
phase1_steps: 200
phase1_max_source_len: 64
phase1_max_target_len: 64
phase1_log_every: 50
phase1_checkpoint_every: 200

# Phase 2: local embedding store
phase2_store_dir: data/embeddings
phase2_batch_size: 32
phase2_lr: 0.001
phase2_steps: 100
phase2_length_loss_weight: 0.1
phase2_log_every: 25
phase2_checkpoint_every: 100

length_slack: 10

output_dir: data/synth_smoke
device: cuda
seed: 42
