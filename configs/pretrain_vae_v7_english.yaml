# ==========================================================================
# v7-style VAE decoder — English-only, new diverse constituents corpus.
#
# Mirrors configs/pretrain_vae_v7.yaml architecture with three changes:
#   - English only (11.66M constituents from wikitext-style paragraphs)
#   - Fresh SPM trained on English IPA (vocab 8000, same size as v7)
#   - Anti-reduplication regularization: unlikelihood n-gram loss +
#     scheduled sampling to suppress the `nd nd nd` degenerate-tail
#     failure mode seen on v8.
#
# NOTE: The dataset_path + spm_model_path below are the vast.ai paths.
# ==========================================================================

dataset_path: /workspace/lfm/data/datasets/english-constituents-v7
# corpus_loader not used when dataset_path is set (DatasetReader handles it)

spm_model_path: /workspace/lfm/data/datasets/english-constituents-v7/spm.model
spm_vocab_size: 8000
syllable_aligned_bpe: true

constituent_context: false

# Architecture — same as v7
latent_dim: 256
encoder_num_layers: 2
decoder_hidden_dim: 512
decoder_num_layers: 4
decoder_num_heads: 8
decoder_dropout: 0.1
num_memory_tokens: 8

attention_head_windows: [3, 3, 7, 7, 15, 15, 0, 0]
attention_global_every: 7
use_rope: true
share_decoder_layers: true
max_seq_len: 0
encoder_pooling: mean

kl_weight: 0.0
kl_free_bits: 0.5
kl_warmup_steps: 10000
kl_beta: 0.0

contrastive_weight: 0.0
contrastive_temperature: 0.07
embeddings_path: ""
phonetic_init: false
phonetic_init_scale: 0.5
phonetic_label_smoothing: 0.0
use_vq: false

# Training — same as v7
batch_size: 320      # was 80; we're at 17% VRAM so can use 4×
gradient_accumulation_steps: 1   # was 4; same effective batch (320)
use_amp: true
lr: 0.0005
lr_min: 0.0001
num_epochs: 3

z_var_weight: 0.01
z_var_target: 0.03
z_var_floor: 0.01
word_dropout: 0.0
word_dropout_min: 0.0
word_dropout_anneal_epochs: 0
dip_weight: 0.1
bow_weight: 0.0

length_boost_threshold: 40    # corpus tail: ~2.9% of samples (p97)
length_boost_factor: 15.0     # 15× boost → ~31% of batch is long/med-long

# Anti-reduplication regularization (NEW — targets degenerate tail)
unlikelihood_weight: 0.15
unlikelihood_window: 4
scheduled_sampling_target: 0.15
scheduled_sampling_start_epoch: 1
scheduled_sampling_warmup_epochs: 2

diagnostic_every: 5000
checkpoint_every_steps: 5000
val_fraction: 0.05
seed: 42
device: cuda
output_path: /workspace/lfm/data/models/v7_english/vae_decoder.pt

topo_weight: 0.0
topo_sample_pairs: 32
use_adversarial: false
adv_weight: 0.1
adv_lr: 0.0001
adv_disc_hidden: 256
adv_disc_embed_dim: 128
adv_warmup_steps: 1000
adv_free_run_len: 32
adv_spectral_norm: true
