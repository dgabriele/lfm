# DepTreeVAE v3 — β-VAE with aggressive KL + free bits
#
# Designed for downstream agent games: the prior region N(0,1) must
# produce coherent, naturally-terminating sentences. High KL weight
# forces the posterior close to the prior; free bits prevent collapse
# by guaranteeing minimum information rate per latent dimension.
#
# Training on 10.4M English dep-parsed IPA sentences.

dataset_path: /workspace/lfm/data/datasets/english-dep-trees-v16
spm_model_path: /workspace/lfm/data/models/v15b_ipa/spm.model
output_dir: /workspace/lfm/data/models/dep_tree_vae_v3

spm_vocab_size: 8000
max_seq_len: 160

# Encoder
encoder_hidden_dim: 512
encoder_num_layers: 2
encoder_num_heads: 8
encoder_dropout: 0.1

# Latent space
latent:
  total_dim: 256
  struct_dim: 64
  content_dim: 192

# Skeleton decoder
skeleton:
  mode: parallel
  hidden_dim: 128
  max_roles: 40
  num_layers: 2
  num_heads: 4
  dropout: 0.1

# Phrase decoder
decoder_hidden_dim: 512
decoder_num_layers: 4
decoder_num_heads: 8
decoder_dropout: 0.1
num_memory_tokens: 8
attention_head_windows: [3, 3, 7, 7, 15, 15, 0, 0]
attention_global_every: 7
use_rope: true
share_decoder_layers: true
freeze_decoder: false

# Disentanglement
disentanglement:
  struct_cls_weight: 1.0
  content_bow_weight: 0.5
  adversarial_weight: 0.0
  gradient_reversal_scale: 0.0
  hsic_weight: 1.0

# KL — aggressive for game-friendly prior
kl_weight: 0.1
kl_free_bits: 0.5
kl_warmup_steps: 10000

# DIP-VAE — disabled (β-VAE already decorrelates)
dip_weight: 0.0

# Z variance regularizer — keeps z informative across all dimensions
z_var_weight: 5.0
z_var_target: 0.05

# Word dropout — forces decoder to use z, not just copy from context
# Annealed from 0.3 → 0.05 over 3 epochs
word_dropout: 0.3
word_dropout_min: 0.05
word_dropout_anneal_epochs: 3

# Training
batch_size: 512
gradient_accumulation_steps: 2
lr: 0.0005
lr_min: 0.0001
num_epochs: 5
use_amp: true
seed: 42
device: cuda

# Logging / checkpoints
log_every: 50
checkpoint_every_steps: 1000
val_fraction: 0.02
