# IPA -> English translator config
# Default configuration for pair generation and translator training.
#
# Usage:
#   lfm translate generate-pairs   (uses PairGenerationConfig defaults)
#   lfm translate train             (uses TranslatorConfig defaults)
#   lfm translate eval              (uses saved model config)

# --- Pair generation ---
pair_generation:
  leipzig_dir: data/leipzig
  languages: [eng]
  max_sentences: 5000
  min_line_length: 30
  decoder_path: data/models/v1/vae_decoder.pt
  spm_path: data/models/v1/spm.model
  encoder_model: all-MiniLM-L6-v2
  encode_batch_size: 64
  max_output_len: 96
  output_path: data/models/v1/translator/pairs.jsonl
  device: cuda
  seed: 42

# --- Translator training ---
translator:
  model_name: Qwen/Qwen2.5-0.5B
  use_lora: false
  lora_r: 16
  lora_alpha: 32
  lora_target_modules: [q_proj, v_proj]

  epochs: 3
  lr: 2.0e-5
  batch_size: 8
  max_len: 256
  gradient_accumulation_steps: 4
  use_amp: true
  warmup_fraction: 0.1
  max_grad_norm: 1.0

  pairs_path: data/models/v1/translator/pairs.jsonl
  val_fraction: 0.1

  eval_max_samples: 200
  eval_max_new_tokens: 64
  eval_temperature: 0.7

  output_dir: data/models/v1/translator
  device: cuda
  seed: 42
