# Dialogue game — v7 full constituency decoder
# vent2: sparsity-driven phrase count (no target), up to max_phrases=3
# vocab_entropy disabled — entropy minimization caused pathological token repetition

decoder_path: data/models/v7/vae_decoder.pt
spm_path: data/models/v7/spm.model
output_dir: data/dialogue_game_v7_vent2
embedding_store_dir: data/embeddings

# Dialogue structure
num_turns: 4
context_hidden_dim: 512
context_heads: 4

# Diffusion z-generator
diffusion_steps: 4
diffusion_layers: 4
diffusion_heads: 8
max_phrases: 3
variable_phrases: true
length_weight: 0.3
z_diversity_weight: 0.3

# Loss
per_turn_weight: 0.0
ce_weight: 0.1
independent_turns: false
vocab_entropy_weight: 0.0

# Phase 2 VRAM management
phase2_vram_budget_mb: 1500
phase2_min_chunk: 1

# Training
batch_size: 72
gradient_accumulation_steps: 1
steps: 4000
gru_lr: 0.00005
receiver_lr: 0.0003
num_distractors: 15
min_targets: 1
max_targets: 1

# Runtime
device: cuda
seed: 42
log_every: 20
checkpoint_every: 100
