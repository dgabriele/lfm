# Tiny smoke test of the HF streaming path and FAISS density backend.

sources:
  - hf_dataset: DKYoon/SlimPajama-6B
    hf_split: train
    text_field: text
    weight: 0.5
    max_samples: 1000
    name: slimpajama-smoke

  - hf_dataset: bigcode/the-stack-smol-xl
    hf_split: train
    text_field: content
    weight: 0.3
    max_samples: 500
    name: stack-smoke

  - hf_dataset: HuggingFaceFW/fineweb-2
    hf_config: cmn_Hani
    hf_split: train
    text_field: text
    weight: 0.2
    max_samples: 500
    name: fineweb2-cmn-smoke

output_dir: data/embeddings_qwen_smoke_v2

extractor:
  model_name: Qwen/Qwen2.5-0.5B
  layer: -1
  pooling: last_token
  dtype: bfloat16
  batch_size: 256
  max_len: 256

density:
  enabled: true
  knn_k: 10
  temperature: 0.7
  target_size: 2000

cluster:
  num_clusters: 32
  random_state: 42
  batch_size: 512

shuffle_seed: 42
device: cuda
max_extracted: 2000
