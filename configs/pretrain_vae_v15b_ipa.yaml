# ==========================================================================
# v15b — same corpus + architecture as v15, but NO z-reg.
#
# v15 had z_var_weight=1.0, z_noise_sigma=0.05 which pushed z_std to
# 0.35 and caused gnorm explosion + wide manifold where the decoder
# produced variable-length output including 3-token bursts.  The agent
# game couldn't learn because the z-gen collapsed to short-output
# z regions.
#
# v15b matches v7's approach: tight posterior, no noise injection.
# The decoder learns a compact manifold where all z's produce
# uniform-length well-formed sentences.
# ==========================================================================

dataset_path: /workspace/lfm/data/datasets/english-sentences-v15
spm_vocab_size: 8000
syllable_aligned_bpe: true

constituent_context: false

# Architecture — unchanged
latent_dim: 256
encoder_num_layers: 2
decoder_hidden_dim: 512
decoder_num_layers: 4
decoder_num_heads: 8
decoder_dropout: 0.1
num_memory_tokens: 8

attention_head_windows: [3, 3, 7, 7, 15, 15, 0, 0]
attention_global_every: 7
use_rope: true
share_decoder_layers: true
max_seq_len: 80
encoder_pooling: mean

# KL off
kl_weight: 0.0
kl_free_bits: 0.5
kl_warmup_steps: 10000
kl_beta: 0.0

# No contrastive at pretrain
contrastive_weight: 0.0
contrastive_temperature: 0.07
embeddings_path: ""

# Phonetic init for IPA
phonetic_init: true
phonetic_init_scale: 0.5
phonetic_label_smoothing: 0.1
use_vq: false

# NO z-reg — tight posterior like v7
z_noise_sigma: 0.0
z_var_weight: 0.0
z_var_target: 0.03
z_var_floor: 0.01

# Training
batch_size: 350
gradient_accumulation_steps: 2
use_amp: true
lr: 0.0005
lr_min: 0.0001
num_epochs: 3

word_dropout: 0.0
word_dropout_min: 0.0
word_dropout_anneal_epochs: 0
dip_weight: 0.1
bow_weight: 0.0

length_boost_threshold: 30
length_boost_factor: 2.0

# Keep unlikelihood + scheduled sampling (proven useful)
unlikelihood_weight: 0.15
unlikelihood_window: 4
scheduled_sampling_target: 0.075
scheduled_sampling_start_epoch: 0
scheduled_sampling_warmup_epochs: 1

# Diagnostics
diagnostic_every: 5000
checkpoint_every_steps: 5000
val_fraction: 0.05
seed: 42
device: cuda
output_path: /workspace/lfm/data/models/v15b_ipa/vae_decoder.pt

# Disabled
topo_weight: 0.0
topo_sample_pairs: 32
