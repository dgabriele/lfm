# Dialogue game on v8 phoneme decoder w/ CLIP-style contrastive scoring.
# Vast.ai variant: /workspace/lfm paths and batch=512 (matching the prior
# successful InfoNCE run — fits comfortably in 24GB).

decoder_path: /workspace/lfm/data/models/v8/vae_decoder.pt
spm_path: /workspace/lfm/data/phoneme_alphabet_multi.json
output_dir: /workspace/lfm/data/dialogue_game_v8_qwen_contrastive
embedding_store_dir: /workspace/lfm/data/embeddings_qwen_v2_clean

generator_name: phoneme_vae
generator_vocab_size: 30   # v8 alphabet (29 phonemes + 1 word-boundary)

# Dialogue structure
num_turns: 4
context_hidden_dim: 512
context_heads: 4

# Diffusion z-generator
diffusion_steps: 4
diffusion_layers: 4
diffusion_heads: 8
max_phrases: 3
variable_phrases: true
target_phrases: 2.0
length_weight: 0.5
z_diversity_weight: 0.3

# CLIP-style contrastive scoring
contrastive_scoring: true
contrastive_temperature: 0.07

# Other losses off
per_turn_weight: 0.0
ce_weight: 0.0
topo_weight: 0.0
independent_turns: false

# Phase 2 VRAM management — bumped for 24GB
phase2_vram_budget_mb: 6000
phase2_min_chunk: 8

# Training — batch_size=512 matches earlier InfoNCE run; keeping constant
# so the learned contrastive temperature stays calibrated.
batch_size: 512
gradient_accumulation_steps: 1
steps: 6000
gru_lr: 0.00005
receiver_lr: 0.0003
num_distractors: 15
min_targets: 1
max_targets: 1

# Runtime
device: cuda
seed: 42
log_every: 20
checkpoint_every: 100
