# Dialogue game — v7 decoder, Qwen-latent targets, REINFORCE round-trip.
#
# Same base hyperparameters as dialogue_v7_qwen_targets.yaml but with
# the Qwen round-trip reward enabled.  This adds a REINFORCE auxiliary
# signal: at each step, K subsampled Neuroglot documents are romanized
# and fed through a frozen Qwen reader.  The cosine between Qwen's
# hidden state and the target embedding becomes a reward, pushing the
# agent toward Neuroglot that Qwen's own text-processing pipeline can
# decode — not just the learned receiver.
#
# batch_size reduced from 115 → 90 to accommodate Qwen 0.5B (~1 GB)
# resident on GPU alongside the dialogue game.

decoder_path: data/models/v7/vae_decoder.pt
spm_path: data/models/v7/spm.model
output_dir: data/dialogue_game_qwen_v2_roundtrip
embedding_store_dir: data/embeddings_qwen_v2_clean

# Dialogue structure
num_turns: 4
context_hidden_dim: 512
context_heads: 4

# Diffusion z-generator
diffusion_steps: 4
diffusion_layers: 4
diffusion_heads: 8
max_phrases: 3
variable_phrases: true
target_phrases: 2.0
length_weight: 0.5
z_diversity_weight: 0.3

# Loss
per_turn_weight: 0.0
ce_weight: 0.1
independent_turns: false

# Qwen round-trip REINFORCE
qwen_roundtrip_weight: 0.1
qwen_roundtrip_model: Qwen/Qwen2.5-0.5B
qwen_roundtrip_samples: 20

# Phase 2 VRAM management (local 3060 Ti 8 GB, tighter with Qwen resident)
phase2_vram_budget_mb: 1200
phase2_min_chunk: 4

# Curriculum — slower ramp than baseline to give the REINFORCE signal
# time to build up alongside receiver discrimination.
warmup_steps: 1000

# Training — reduced batch for VRAM headroom
batch_size: 90
gradient_accumulation_steps: 1
steps: 4000
gru_lr: 0.00005
receiver_lr: 0.0003
num_distractors: 15
min_targets: 1
max_targets: 1

# Runtime
device: cuda
seed: 42
log_every: 20
checkpoint_every: 100
