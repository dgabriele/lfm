# Curriculum Phase 3: Bilingual Documents with Cluster Anchors
# Force cross-lingual bridging via shared context windows.
# Each document: [C{id}] [T0] xenoglot... [T1] ... [EN] English passage
#
# The model must attend across both languages within a single forward
# pass.  Cluster anchors [C{id}] create shared pivot representations
# that exist in the intersection of both language subspaces.
#
# Resume from Phase 2 output model.
# Output: data/translator_curriculum_v7/phase3/model/

model_name: data/translator_curriculum_v7/phase2/model
corpus_path: data/translator/bilingual_corpus_v7.txt
output_dir: data/translator_curriculum_v7/phase3

epochs: 2
lr: 3e-5
batch_size: 8
max_len: 512
gradient_accumulation_steps: 16
use_amp: true
warmup_fraction: 0.1
max_grad_norm: 1.0
checkpoint_fraction: 0.1

use_ema: true
ema_decay: 0.95
ema_interval: 1

device: cuda
seed: 42
