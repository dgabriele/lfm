# vast.ai run — Qwen2.5-0.5B on RTX 3090 (24GB VRAM)
# Mirrors configs/synth_local_qwen.yaml but with batch / max_len scaled up
# to use the larger VRAM budget. Phase 1 only (game training comes later).

vocab_size: 8000
vocab_seed: 42

base_model_name: Qwen/Qwen2.5-0.5B

source_embedding_dim: 896    # per-position dim of last_k_concat source
n_prefix_tokens: 8

# Phase 1 (v4.1: NER-normalised corpus + cosine schedule + body warmup +
# RTD coherence + termination-awareness)
phase1_dataset_dir: data/embeddings_qwen/passages_normalized.jsonl
phase1_batch_size: 96
phase1_grad_accum: 1               # 24GB lets us use a single big batch
phase1_lr: 0.0007                  # peak cipher_lr; sqrt-scaled from local 5e-4
phase1_body_lr: 0.00003
phase1_lr_min: 0.00003
phase1_lr_schedule: cosine
phase1_body_warmup_steps: 3000
phase1_hidden_mse_weight: 0.01
phase1_coherence_weight: 0.1
phase1_coherence_replace_frac: 0.10
phase1_ending_weight: 0.1
phase1_ending_window: 5
phase1_steps: 50000
phase1_max_len: 128
phase1_filter_truncated: true
phase1_log_every: 200
phase1_diag_every: 1000
phase1_checkpoint_every: 1000

# Phase 2 (placeholder; not yet trained — game-based path will replace)
phase2_store_dir: data/embeddings_qwen
phase2_batch_size: 128
phase2_lr: 0.001
phase2_steps: 100000
phase2_length_loss_weight: 0.1
phase2_log_every: 200
phase2_checkpoint_every: 2000

length_slack: 10

output_dir: data/synth_qwen_local
device: cuda
seed: 42
