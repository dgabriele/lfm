# SynthContrastiveGame — local (RTX 3060 Ti, 8GB VRAM) PoC config.
# Trains the PrefixProjector against a frozen Phase 1 SynthLM checkpoint
# via round-trip contrastive discrimination + anti-collapse regularisers.

# ── SynthLM source ──────────────────────────────────────────────────────
synth_config: configs/synth_local_qwen.yaml
phase1_checkpoint: data/synth_qwen_local/phase1_final_v4.1_vast.pt

# ── Source / generation ─────────────────────────────────────────────────
source_dim: 896
n_source_positions: 8
n_prefix_tokens: 8
max_gen_len: 48

# ── Contrastive loss ────────────────────────────────────────────────────
contrastive_temperature: 0.07
embedding_dim: 896

# ── Loss weights ────────────────────────────────────────────────────────
info_nce_weight: 1.0
topology_weight: 0.1
adj_diversity_weight: 0.05

# Multi-order n-gram KL — Surgery B targets weak structure beyond unigram.
# Each entry: {n, weight, path}. Reference .npz built via build_synth_ngram.py.
# Higher orders constrain deeper sequential structure (analysis showed
# gzip ratio ≈ 0.96 with bigram-only — corpus had little structure beyond
# unigram). Adding n=3 + n=4 directly pressures higher-order match.
ngram_kl:
  - {n: 2, weight: 0.05, path: data/synth_qwen_local/bigram_topk.npz}
  - {n: 3, weight: 0.05, path: data/synth_qwen_local/3gram_topk.npz}
  - {n: 4, weight: 0.03, path: data/synth_qwen_local/4gram_topk.npz}

# ── Diversity / anti-degenerate ─────────────────────────────────────────
adj_diversity_target: 0.30
ngram_block: [3, 4]      # block 3,4-gram repeats during AR generation

# ── Generation control ──────────────────────────────────────────────────
generation_temperature: 1.0
eos_token_id: 3
pad_token_id: 0

# ── Curriculum on explicit distractors ──────────────────────────────────
distractor_curriculum_start: 0
distractor_curriculum_end: 2000

# ── Trainer config ──────────────────────────────────────────────────────
embedding_store_dir: data/embeddings_qwen_subset   # 50K passage subset for fast iteration on 8GB
batch_size: 32                   # body is frozen in the game (no body grads/Adam state) so memory budget is much lower than Phase 1 — single-pass batch 32 fits comfortably
gradient_accumulation_steps: 1
steps: 5000
num_distractors: 31              # batch+distractors = 32 + 32*31 = 1024-way (DepTreeVAE benchmark)
max_grad_norm: 1.0
contrastive_scoring: true

projector_lr: 0.0001
head_lr: 0.0001
log_temperature_lr: 0.001

log_every: 25
checkpoint_every: 100
output_dir: data/synth_contrastive_v2_local   # v2 = positional pool + multi-order n-gram KL
device: cuda
seed: 42

curriculum:
  enabled: true
  warmup_steps: 2000     # longer ramp for the harder 1024-way discrimination
  start_hard_ratio: 0.0
  end_hard_ratio: 1.0
