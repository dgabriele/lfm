# Diversified Qwen-latent target build — vast.ai RTX 3090 variant.
#
# Sentence-aware chunking is ENABLED: every input document is split
# into coherent multi-sentence chunks of up to ``chunking.max_tokens``,
# so every pooled hidden state represents a complete semantic unit
# (not a mid-sentence fragment).  Per-source caps are correspondingly
# reduced — each doc produces ~1-3 chunks on average, so 1.3M raw docs
# yields roughly 2M chunks for extraction.
#
# Extractor config: batch 1024, compile, sdpa attention on 24 GB 3090.

sources:
  # --- English pretraining baseline -----------------------------------
  - hf_dataset: DKYoon/SlimPajama-6B
    hf_split: train
    text_field: text
    weight: 0.30
    max_samples: 400000
    name: slimpajama-6b

  - hf_dataset: HuggingFaceFW/fineweb-edu
    hf_config: sample-10BT
    hf_split: train
    text_field: text
    weight: 0.17
    max_samples: 220000
    name: fineweb-edu

  # --- Multilingual coverage (Qwen 2.5 is strong in EN/ZH/JA) ---------
  - hf_dataset: HuggingFaceFW/fineweb-2
    hf_config: cmn_Hani
    hf_split: train
    text_field: text
    weight: 0.15
    max_samples: 200000
    name: fineweb2-cmn

  - hf_dataset: HuggingFaceFW/fineweb-2
    hf_config: jpn_Jpan
    hf_split: train
    text_field: text
    weight: 0.10
    max_samples: 130000
    name: fineweb2-jpn

  # --- Code (upweighted above SlimPajama's GitHub share) -------------
  - hf_dataset: bigcode/the-stack-smol-xl
    hf_split: train
    text_field: content
    weight: 0.15
    max_samples: 200000
    name: stack-smol-xl

  # --- Synthetic educational / technical register --------------------
  - hf_dataset: HuggingFaceTB/smollm-corpus
    hf_config: cosmopedia-v2
    hf_split: train
    text_field: text
    weight: 0.10
    max_samples: 130000
    name: cosmopedia-v2

  # --- Long-form books (public domain) -------------------------------
  - hf_dataset: manu/project_gutenberg
    hf_split: en
    text_field: text
    weight: 0.03
    max_samples: 20000
    min_length: 200
    max_length: 4000
    name: gutenberg-en

output_dir: data/embeddings_qwen_v2

extractor:
  model_name: Qwen/Qwen2.5-0.5B
  layer: -1
  pooling: last_token
  dtype: bfloat16
  batch_size: 1024
  max_len: 256
  compile: true
  attn_implementation: sdpa

chunking:
  enabled: true
  max_tokens: 240
  max_chunks_per_doc: 3
  min_chunk_tokens: 30

density:
  enabled: true
  knn_k: 10
  temperature: 0.7
  target_size: 1000000

cluster:
  num_clusters: 2047
  random_state: 42
  batch_size: 4096

shuffle_seed: 42
device: cuda
max_extracted: null
