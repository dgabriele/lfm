model_type: dep_tree_vae

# DepTree VAE (AR) — vast.ai RTX 3090 (24GB)
# AR phrase decoder on clean dep-tree dataset with
# topology, entropy floor, and one-sided z_var.

dataset_path: /workspace/lfm/data/datasets/english-dep-trees-v16-depth4
spm_model_path: /workspace/lfm/data/models/v15b_ipa/spm.model
output_dir: /workspace/lfm/data/models/dep_tree_vae_v1

spm_vocab_size: 8000
max_seq_len: 80

encoder_hidden_dim: 512
encoder_num_layers: 2
encoder_num_heads: 8
encoder_dropout: 0.1

latent:
  total_dim: 384
  struct_dim: 384
  content_dim: 384

skeleton:
  mode: parallel
  hidden_dim: 128
  max_roles: 40
  num_layers: 2
  num_heads: 4
  dropout: 0.1

decoder_hidden_dim: 512
decoder_num_layers: 4
decoder_num_heads: 8
decoder_dropout: 0.1
num_memory_tokens: 8
attention_head_windows: [3, 3, 7, 7, 15, 15, 0, 0]
attention_global_every: 7
use_rope: true
share_decoder_layers: true
freeze_decoder: false

disentanglement:
  struct_cls_weight: 0.0
  content_bow_weight: 0.0
  adversarial_weight: 0.0
  gradient_reversal_scale: 0.0
  hsic_weight: 0.0

kl_weight: 0.01
kl_free_bits: 0.5
kl_warmup_steps: 5000
dip_weight: 0.0

# One-sided: only penalizes below-floor variance
z_var_weight: 5.0
z_var_target: 0.05

# Z-prediction: decoder must retain z in hidden states
z_pred_weight: 0.0

# Topology — z distances preserve decoded-output distances
topo_weight: 1.0
# Interpolation smoothness (placeholder — needs z_mid decode)
interp_weight: 0.0
# Entropy floor — DROPPED. The 1.5-nat floor in an 8000-vocab decoder
# was forcing every output position to spread mass over 4-5 tokens,
# preventing confident commits to specific lexical content and biasing
# the argmax toward high-prior fillers (cycling cause).
entropy_floor: 0.0
entropy_weight: 0.0
# Repetition penalty — DROPPED. Cosine-sim of consecutive logit vectors
# wasn't catching the actual cycling we observed (adjacent identical
# argmax tokens from prior-dominated distributions). Role conditioning
# + per-role token-count head address the structural cause directly.
rep_penalty_weight: 0.0
# Completeness scorer
completeness_scorer_path: ""
completeness_weight: 0.0

# EOS sharpening — upweight EOS token in next-token CE so termination
# is decisive at the GT EOS position.
eos_class_weight: 3.0

# Length-prediction head — z encodes the target token count.
# When use_predicted_length_at_decode is true, _greedy_decode takes
# the per-sample prediction as expected_len, replacing the global default.
length_pred_weight: 0.1
use_predicted_length_at_decode: true

# Per-role token-count head — predicts tokens-per-role from per-role memory.
# At inference, replaces the uniform monotonic role-to-position mapping
# with a non-uniform distribution matching the training data, eliminating
# the failure mode where multiple consecutive positions receive the same
# role and the decoder cycles on role-typical fillers.
tokens_per_role_weight: 0.1
max_tokens_per_role: 12

# Decode-time defaults (used by _greedy_decode and downstream pipelines).
# Empirically tuned via DecodeAutotuner; with the length head + EOS
# class weight active these become fallbacks rather than primary fixes.
eos_boost: 8.0
expected_len: 10
ngram_block: [2, 3, 4]

# Word dropout fully anneals to 0 by the last epoch — eliminates the
# train/inference distribution mismatch that biases decoder confidence.
word_dropout: 0.3
word_dropout_min: 0.0
word_dropout_anneal_epochs: 4

batch_size: 176
gradient_accumulation_steps: 2
lr: 0.0005
lr_min: 0.0001
num_epochs: 5
use_amp: true
seed: 42
device: cuda

log_every: 50
checkpoint_every_steps: 1000
val_fraction: 0.02
