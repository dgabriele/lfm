# Diversified Qwen-latent target build.
#
# Streams from HuggingFace — no Leipzig, no local-only corpus.  The
# mix targets dense, diverse coverage of Qwen 2.5's latent space across
# multiple domains (web, books, code, synthetic educational),
# registers (news/prose/code/encyclopedic), and languages (EN, ZH, JA).
#
# Extraction: ~3M samples → density-resample → 1M-passage store.
# Estimated wall time: ~45-60 min on RTX 3060 Ti with batch_size=64.

sources:
  # --- English pretraining baseline -----------------------------------
  - hf_dataset: DKYoon/SlimPajama-6B
    hf_split: train
    text_field: text
    weight: 0.30
    max_samples: 900000
    name: slimpajama-6b

  - hf_dataset: HuggingFaceFW/fineweb-edu
    hf_config: sample-10BT
    hf_split: train
    text_field: text
    weight: 0.17
    max_samples: 500000
    name: fineweb-edu

  # --- Multilingual coverage (Qwen 2.5 is strong in EN/ZH/JA) ---------
  - hf_dataset: HuggingFaceFW/fineweb-2
    hf_config: cmn_Hani
    hf_split: train
    text_field: text
    weight: 0.15
    max_samples: 450000
    name: fineweb2-cmn

  - hf_dataset: HuggingFaceFW/fineweb-2
    hf_config: jpn_Jpan
    hf_split: train
    text_field: text
    weight: 0.10
    max_samples: 300000
    name: fineweb2-jpn

  # --- Code (upweighted above SlimPajama's GitHub share) -------------
  - hf_dataset: bigcode/the-stack-smol-xl
    hf_split: train
    text_field: content
    weight: 0.15
    max_samples: 450000
    name: stack-smol-xl

  # --- Synthetic educational / technical register --------------------
  - hf_dataset: HuggingFaceTB/smollm-corpus
    hf_config: cosmopedia-v2
    hf_split: train
    text_field: text
    weight: 0.10
    max_samples: 300000
    name: cosmopedia-v2

  # --- Long-form books (public domain) -------------------------------
  - hf_dataset: manu/project_gutenberg
    hf_split: en
    text_field: text
    weight: 0.03
    max_samples: 50000
    min_length: 200
    max_length: 4000
    name: gutenberg-en

output_dir: data/embeddings_qwen_v2

extractor:
  model_name: Qwen/Qwen2.5-0.5B
  layer: -1
  pooling: last_token
  dtype: bfloat16
  batch_size: 256
  max_len: 256

density:
  enabled: true
  knn_k: 10
  temperature: 0.7
  target_size: 1000000

cluster:
  num_clusters: 2047
  random_state: 42
  batch_size: 4096

shuffle_seed: 42
device: cuda
max_extracted: null
