# Minimal pretraining test — 5 optimizer steps
model_name: Qwen/Qwen2.5-0.5B
corpus_path: data/translator/dialogue_corpus_test_tagged.txt
output_dir: data/translator_dialogue_v7

epochs: 1
lr: 5e-5
batch_size: 1
max_len: 128
gradient_accumulation_steps: 4
use_amp: true
warmup_fraction: 0.1
max_grad_norm: 1.0
checkpoint_fraction: 0.5

device: cuda
seed: 42
