# SynthContrastiveGame — Phase 2 on top of multisent Phase 1.
#
# Starts clean: n_paragraphs=1, all surgery weights at 0.
# The multisent Phase 1 substrate should produce discourse-coherent
# paragraphs natively; we should not need Surgery C/D/E/F unless
# diagnostics (lex_coh, ttr, pos_div) show collapse after 2-3K steps.
#
# Reintroduce in order of evidence:
#   1. topology_weight / adj_diversity_weight — always fine to have
#   2. n-gram KL — only if rep_rate climbs above 0.05
#   3. Surgery C (n_paragraphs>1) — only if single-para game saturates
#   4. Surgery D/E/F — only if Surgery C composition is not emerging

# ── SynthLM source ──────────────────────────────────────────────────────
synth_config: configs/synth_multisent_local.yaml
phase1_checkpoint: data/synth_qwen_multisent/phase1_latest.pt

# ── Source / generation ─────────────────────────────────────────────────
source_dim: 896
n_source_positions: 8
n_prefix_tokens: 8               # must match n_source_positions for per-position projection
max_gen_len: 256                 # paragraphs can be long; was 48 for sentences

# ── Contrastive loss ────────────────────────────────────────────────────
contrastive_temperature: 0.07
embedding_dim: 896

# ── Loss weights — clean slate, no surgery ──────────────────────────────
info_nce_weight: 1.0
info_nce_aggregate_weight: 0.0  # Surgery D off
residual_weight: 0.0            # Surgery E off
residual_margin: 0.05
token_recurrence_weight: 0.0    # Surgery F off
token_recurrence_target: 0.5
topology_weight: 0.1
adj_diversity_weight: 0.05

# n-gram KL — naturalness anchor (reconstruction_weight is primary diversity driver).
# Reduced weights: ngram_kl now plays a *floor on surface plausibility* role while
# reconstruction loss pushes meaning preservation (which forces diversity intrinsically).
ngram_kl:
  - n: 2
    weight: 0.1
    path: data/synth_qwen_multisent/2gram_topk.npz
  - n: 3
    weight: 0.05
    path: data/synth_qwen_multisent/3gram_topk.npz

# ── Round-trip meaning preservation (primary linguistic constraint) ─────
# InverseDecoder reads alien token sequence (surface_emb, no prefix
# leak); contrastive form: must DISCRIMINATE this anchor from others.
# Forces alien text to encode source content distinguishably, not just
# match a global mean. Drives "the alien text carries meaning".
reconstruction_weight: 1.0
reconstruction_layers: 2

# ── Naturalness KL: compositional grammar anchor ────────────────────────
# KL(p_projector || p_phase1_unconditioned). Tethers the prefix-
# conditioned distribution to Phase 1's natural alien-language grammar:
# subject-verb-object, sentence boundaries, content/function alternation
# all carried by Phase 1. The projector must steer minimally — encode
# source content within the existing grammatical structure rather than
# replacing it with a non-linguistic code. Together with reconstruction
# this is the information-bottleneck compositional formulation.
naturalness_kl_weight: 0.3
adj_diversity_target: 0.30
ngram_block: []                 # ngram_kl handles distribution; no hard blocking

# ── Generation control ──────────────────────────────────────────────────
generation_temperature: 1.0
eos_token_id: 3
pad_token_id: 0

# ── Multi-paragraph (Surgery C) — off to start ──────────────────────────
n_paragraphs: 1
coherence_weight: 0.0
coherence_target_cos: 0.5

# ── Curriculum on explicit distractors ──────────────────────────────────
distractor_curriculum_start: 0
distractor_curriculum_end: 2000

# ── Online hard-negative mining ─────────────────────────────────────────
hard_neg_refresh_every: 500
hard_neg_topk: 100
hard_neg_warmup: 2000

# ── Trainer config ──────────────────────────────────────────────────────
embedding_store_dir: data/embeddings_qwen
batch_size: 32
gradient_accumulation_steps: 1
steps: 15000
num_distractors: 31             # 32-way pool (batch + 31 explicit distractors)
max_grad_norm: 1.0
contrastive_scoring: true

projector_lr: 0.0001
head_lr: 0.0001
log_temperature_lr: 0.001

log_every: 25
checkpoint_every: 250
output_dir: data/synth_contrastive_multisent
device: cuda
seed: 42

curriculum:
  enabled: true
  warmup_steps: 2000
  start_hard_ratio: 0.0
  end_hard_ratio: 1.0
