# Dialogue game — multi-turn self-play through frozen decoder
# Observer/Analyst roles alternate, each turn conditioned on data + history.
# Produces multi-turn corpus with discourse structure for LLM pretraining.

decoder_path: data/models/v5-leaf-27/vae_decoder.pt
spm_path: data/models/v5-leaf-27/spm.model
output_dir: data/dialogue_game
embedding_store_dir: data/embeddings

# Dialogue structure
num_turns: 4
context_hidden_dim: 512
context_heads: 4

# Diffusion z-generator (shared across turns)
diffusion_steps: 4
diffusion_layers: 4
diffusion_heads: 8
max_phrases: 6
variable_phrases: true
target_phrases: 3.0
length_weight: 0.5
z_diversity_weight: 0.3

# Training
batch_size: 48
gradient_accumulation_steps: 4
steps: 4000
gru_lr: 0.0003
receiver_lr: 0.001
num_distractors: 15

# No curriculum — 100% hard negatives
no_curriculum: true

# Runtime
device: cuda
seed: 42
log_every: 20
checkpoint_every: 100
