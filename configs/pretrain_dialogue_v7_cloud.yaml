# LLM pretraining on dialogue corpus — cloud (RTX 3090, 24GB)
model_name: Qwen/Qwen2.5-0.5B
corpus_path: data/translator/dialogue_corpus_v7_tagged.txt
output_dir: data/translator_dialogue_v7

epochs: 2
lr: 5e-5
batch_size: 8
max_len: 512
gradient_accumulation_steps: 16
use_amp: true
warmup_fraction: 0.1
max_grad_norm: 1.0
checkpoint_fraction: 0.1

device: cuda
seed: 42
