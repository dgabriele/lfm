# Curriculum Phase 2: Batch-Interleaved Xenoglot + English
# Maintain English knowledge while deepening xenoglot competence.
# 70% xenoglot, 30% English — prevents catastrophic forgetting.
#
# Resume from Phase 1 output model.
# Output: data/translator_curriculum_v7/phase2/model/

model_name: data/translator_curriculum_v7/phase1/model
corpus_path: data/translator/dialogue_corpus_v7_tagged.txt
english_corpus_path: data/translator/english_paragraphs.txt
english_ratio: 0.3
output_dir: data/translator_curriculum_v7/phase2

epochs: 2
lr: 1e-4
batch_size: 8
max_len: 512
gradient_accumulation_steps: 16
use_amp: true
warmup_fraction: 0.1
max_grad_norm: 1.0
checkpoint_fraction: 0.1

use_ema: true
ema_decay: 0.92
ema_interval: 1

device: cuda
seed: 42
